variables:
  GIT_SSL_NO_VERIFY: "true"
  GIT_SUBMODULE_STRATEGY: recursive

before_script:
    
    - export BUILD_DIR=/home/gitlab-runner/builds/$CI_RUNNER_SHORT_TOKEN/$CI_JOB_ID
    - export CLONE_DIR="$BUILD_DIR/$CI_PROJECT_PATH"
    - mkdir -p $BUILD_DIR
    - cd $BUILD_DIR
    - rm -rf $CLONE_DIR
    - export REPO=`echo $CI_PROJECT_URL | sed -e s#https://##`
    - echo '#!/bin/bash' > hog_git;
      echo 'REALGIT=$(which git)' >> hog_git;
      echo 'RETRIES=3' >> hog_git;
      echo 'DELAY=2' >> hog_git;
      echo 'COUNT=0' >> hog_git;
      echo 'while [ $COUNT -lt $RETRIES ]; do' >> hog_git;
      echo '  $REALGIT "$@"' >> hog_git;
      echo '  if [ $? -eq 0 ]; then' >> hog_git;
      echo '    RETRIES=0' >> hog_git;
      echo '    break' >> hog_git;
      echo '  fi' >> hog_git;
      echo '  let COUNT=$COUNT+1' >> hog_git;
      echo '  sleep $DELAY' >> hog_git;
      echo 'done' >> hog_git;
      chmod +x hog_git;
    - ./hog_git clone --recursive https://${HOG_USER}:${HOG_PUSH_TOKEN}@$REPO $CLONE_DIR
    - cd $CLONE_DIR
    - . $BUILD_DIR/hog_git remote set-url origin https://${HOG_USER}:${HOG_PUSH_TOKEN}@$REPO
    - . $BUILD_DIR/hog_git config user.email ${HOG_EMAIL}
    - . $BUILD_DIR/hog_git config user.name ${HOG_USER}
    - . $BUILD_DIR/hog_git fetch origin $CI_COMMIT_REF_NAME
    - . $BUILD_DIR/hog_git fetch origin $CI_MERGE_REQUEST_TARGET_BRANCH_NAME
    - . $BUILD_DIR/hog_git checkout $CI_COMMIT_REF_NAME --
    - . $BUILD_DIR/hog_git submodule update
    - export XILINXD_LICENSE_FILE=${HOG_XIL_LICENSE}
    - export PATH=${HOG_PATH}:$PATH
    - export LD_LIBRARY_PATH=${HOG_LD_LIBRARY_PATH}:$LD_LIBRARY_PATH

stages:
  - merge
  - dynamic_generate
  - dynamic_triggers
  - user_pre
  - generation_and_simulation
  - user_proj
  - collect
  - user_post
  - archive
